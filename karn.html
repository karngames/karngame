      <button class="btn small" onclick="repGoto(REP.idx-1)">◀</button>
      <button class="btn small gold" onclick="repPlayToggle()">${REP.timer?'⏸ Pause':'▶ Play'}</button>
      <button class="btn small" onclick="repNext()">▶</button>
      <button class="btn small" onclick="repGoto(REP.steps.length)">⏭</button>
    </div>
    ${REP.reviewing
      ?`<div class="hint" style="margin-top:12px"><span class="thinking">🔬 Engine reviewing… ${REP.reviewing.done}/${REP.reviewing.total} moves</span></div>`
      :REP.review?reviewSummaryHTML()
      :`<button class="btn wide" style="margin-top:12px" onclick="reviewGame()">📊 Review game</button>`}
    </div>
    ${info?`<div class="panel">
      <div style="font-weight:800;font-size:14px;color:${TAGCOL[info.tag]}">${TAGSYM[info.tag]} ${info.tag.toUpperCase()}${info.delta?` <span style="font-weight:600;font-size:12px">(−${info.delta})</span>`:''}
        <span style="color:var(--dim);font-size:11px;font-weight:600"> · ${PNAME[info.by]}</span></div>
      ${info.bestText?`<div class="hint" style="margin-top:6px">Engine preferred: <b>${info.bestText}</b></div>`:'<div class="hint" style="margin-top:6px">The engine agrees with this move.</div>'}
    </div>`
    :`<div class="panel"><div class="hint" style="margin:0">Click any piece to inspect it.${REP.review?' Step through the game to see the engine\'s verdict on every move.':''}</div></div>`}
    <button class="btn wide" onclick="repExit()">✕ Exit replay</button>`;
}

/* ================= MENU / BOOT ================= */
function showMenu(){
  UI.menuSide=UI.menuSide??0;UI.menuDiff=UI.menuDiff??'normal';
  UI.menuMode=UI.menuMode??'play';UI.menuDiffW=UI.menuDiffW??'hard';UI.menuDiffB=UI.menuDiffB??'hard';
  const watch=UI.menuMode==='watch';
  showModal(`<h2>KARN</h2><div class="sub">Build your pieces. Command the battlefield. Two ways to win.</div>
    <h4>Mode</h4>
    <div class="optgrid">
      <button class="chip ${UI.menuMode==='play'?'on':''}" onclick="menuMode('play')">🎮 Play vs AI</button>
      <button class="chip ${UI.menuMode==='pvp'?'on':''}" onclick="menuMode('pvp')">🤝 2 Players</button>
      <button class="chip ${UI.menuMode==='online'?'on':''}" onclick="menuMode('online')">🌐 Online (LAN)</button>
      <button class="chip ${watch?'on':''}" onclick="menuMode('watch')">👁 Watch AI vs AI</button>
    </div>
    ${UI.menuMode==='online'?onlineMenuHTML()
    :UI.menuMode==='pvp'?`
    <div class="sub" style="margin:14px 0 4px">Hotseat battle on one screen — White sets up and moves first, then pass to Black. Full setup lets each commander build their own army in secret… ish.</div>
    <div style="height:10px"></div>
    <div class="row">
      <button class="btn gold" onclick="menuStart(true)">⚡ Quick start</button>
      <button class="btn" onclick="menuStart(false)">🛠 Full setup</button>
      <span class="grow"></span>
      <button class="btn small" onclick="showRules()">📖 Rules</button>
    </div>`
    :watch?`
    <h4>⬜ White AI</h4>
    <div class="optgrid">${['easy','normal','hard'].map(d=>`<button class="chip p0 ${UI.menuDiffW===d?'on':''}" onclick="menuDiffW('${d}')">${DIFFS[d].label}</button>`).join('')}</div>
    <h4>⬛ Black AI</h4>
    <div class="optgrid">${['easy','normal','hard'].map(d=>`<button class="chip p1 ${UI.menuDiffB===d?'on':''}" onclick="menuDiffB('${d}')">${DIFFS[d].label}</button>`).join('')}</div>
    <div style="height:18px"></div>
    <div class="row">
      <button class="btn gold" onclick="menuStart(true)">▶ Start match</button>
      <span class="grow"></span>
      <button class="btn small" onclick="showRules()">📖 Rules</button>
    </div>`
    :`
    <h4>Play as</h4>
    <div class="optgrid">
      <button class="chip p0 ${UI.menuSide===0?'on':''}" onclick="menuSide(0)">⬜ White — deploys & moves first</button>
      <button class="chip p1 ${UI.menuSide===1?'on':''}" onclick="menuSide(1)">⬛ Black — sets up in defence</button>
    </div>
    <h4>AI difficulty</h4>
    <div class="optgrid">
      ${['easy','normal','hard'].map(d=>`<button class="chip ${UI.menuDiff===d?'on':''}" onclick="menuDiff('${d}')">${DIFFS[d].label}</button>`).join('')}
    </div>
    <div style="height:18px"></div>
    <div class="row">
      <button class="btn gold" onclick="menuStart(true)">⚡ Quick start</button>
      <button class="btn" onclick="menuStart(false)">🛠 Full setup</button>
      <span class="grow"></span>
      <button class="btn small" onclick="showRules()">📖 Rules</button>
    </div>`}`,false);
}
function menuSide(v){UI.menuSide=v;showMenu();}
function menuDiff(v){UI.menuDiff=v;showMenu();}
function menuMode(v){UI.menuMode=v;showMenu();}
function menuDiffW(v){UI.menuDiffW=v;showMenu();}
function menuDiffB(v){UI.menuDiffB=v;showMenu();}
function menuStart(quick){
  closeModal();
  /* always start from a clean slate — vital on the website Play page,
     where a previous game may still be sitting in memory */
  G=newState();
  UI.sel=null;UI.busy=false;UI.wiz={};UI.lastLog=[];UI.paused=false;UI.resume=null;
  initBoard();
  if(UI.menuMode==='pvp'){
    G.mode='pvp';G.human=0;
    if(quick){
      const m=randomMid();
      G.walls=new Set(midWalls(m.cols,m.flip).map(w=>key(w[0],w[1])));
      autoSetup(G,0);autoSetup(G,1);
      enterPlay();
    }else{
      G.phase='mid';UI.wiz={mid:randomMid(),myWalls:[]};
      applyMidPreview();
    }
    return;
  }
  if(UI.menuMode==='watch'){
    G.mode='aivai';G.human=0;G.diffs=[UI.menuDiffW,UI.menuDiffB];G.diff=UI.menuDiffW;
    const m=randomMid();
    G.walls=new Set(midWalls(m.cols,m.flip).map(w=>key(w[0],w[1])));
    autoSetup(G,0);autoSetup(G,1);
    logMsg(`👁 Exhibition match — ⬜ ${DIFFS[G.diffs[0]].label} vs ⬛ ${DIFFS[G.diffs[1]].label}. Click any piece to inspect it.`,'sys');
    enterPlay();
    return;
  }
  G.mode='pvai';G.human=UI.menuSide;G.diff=UI.menuDiff;
  if(quick){
    const m=randomMid();
    G.walls=new Set(midWalls(m.cols,m.flip).map(w=>key(w[0],w[1])));
    autoSetup(G,0);autoSetup(G,1);
    enterPlay();
  }else{
    G.phase='mid';UI.wiz={mid:randomMid(),myWalls:[]};
    applyMidPreview();
  }
}
function startNewGame(){
  hidePopup();closeModal();
  if(NET.match&&!NET.resultShown)api('/api/match/'+NET.match+'/resign',{}).catch(()=>{});
  stopMatchPoll();
  if(REP){if(REP.timer)clearInterval(REP.timer);REP=null;}
  if(!SITE.web)stopLobbyPoll();
  NET.match=null;NET.evN=0;NET.resultShown=false;
  G=newState();
  UI.sel=null;UI.busy=false;UI.wiz={};UI.lastLog=[];UI.paused=false;UI.resume=null;
  initBoard();render();
  if(SITE.web)showPage('play');else showMenu();
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){hidePopup();if(modalDismiss)dismissModal();}});
window.addEventListener('load',()=>{
  SITE.web=location.protocol==='http:'||location.protocol==='https:';
  if(!SITE.web){startNewGame();return;}
  /* website mode: served by server.js — login first, like a real site */
  const hb=document.getElementById('hdrBtns');
  if(hb)hb.style.display='none';   /* the side menu covers Rules & New Game */
  NET.server=location.origin;
  UI.menuSide=0;UI.menuDiff='normal';UI.menuMode='play';UI.menuDiffW='hard';UI.menuDiffB='hard';
  /* pull the server's game balance + custom pages before anything is built */
  Promise.allSettled([api('/api/balance'),api('/api/pages')]).then(rs=>{
    if(rs[0].status==='fulfilled'){applyBalance(rs[0].value.balance);NET.balV=rs[0].value.v;}
    if(rs[1].status==='fulfilled'&&rs[1].value.pages)PAGES=rs[1].value.pages;
  }).then(()=>{
  G=newState();initBoard();render();
  renderNav();
  /* guest ticket link from a support email */
  const gt=String(location.search||'').match(/[?&]ticket=([a-f0-9]{16,})/);
  if(gt){
    try{history.replaceState(null,'',location.pathname||'/');}catch(e){}
    showGuestTicket(gt[1]);
    return;
  }
  /* one-time login link from a lockout email */
  const lk=String(location.search||'').match(/[?&]loginkey=([a-f0-9]{20,})/);
  if(lk){
    api('/api/loginkey',{key:lk[1]}).then(r=>{
      NET.token=r.token;NET.user=r.profile.user;NET.profile=r.profile;netSave();
      try{history.replaceState(null,'',location.pathname||'/');}catch(e){}
      toast('🔗 Logged in via email link — welcome back, '+NET.user);
      enterSite();
    }).catch(e=>{toast(e.message);showAuth();});
    return;
  }
  if(NET.token){
    api('/api/me').then(r=>{NET.profile=r.profile;NET.user=r.profile.user;enterSite();})
      .catch(()=>{NET.token=null;netSave();showAuth();});
  }else showAuth();
  });
});

</script>
